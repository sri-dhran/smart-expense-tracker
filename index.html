<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Expense Tracker</title>
    <meta name="description" content="Login to your Smart Expense Tracker account to manage your finances.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-wallet"></i>
                    <h1>Smart<span>Expense</span></h1>
                </div>
                <h2>Welcome Back</h2>
                <p>Login to continue tracking</p>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="example@mail.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                
                <div id="error-message" class="error-msg hidden"></div>
                
                <button type="submit" class="btn-primary">Login</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign up now</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import Auth from './auth.js';
        
        // Redirect if already logged in
        Auth.redirectIfAuthenticated();

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-message');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            errorMsg.classList.add('hidden');
            errorMsg.innerText = '';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                return showError('Please enter both email and password');
            }

            const result = Auth.login(email, password);
            if (result.success) {
                // Smoothly redirect
                form.innerHTML = `
                    <div class="success-state">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
                        <p>Logging you in...</p>
                    </div>
                `;
                setTimeout(() => {
                    window.location.replace('dashboard.html');
                }, 1000);
            } else {
                showError(result.message);
            }
        });

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
        }

        // Toggle password visibility
        document.querySelector('.toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    </script>
</body>
</html>
