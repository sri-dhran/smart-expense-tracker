<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker | Dashboard</title>
    <meta name="description" content="A clean and modern expense tracker to manage your personal finances effectively.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">
    <div class="app-container">
        <!-- Sidebar/Header for Mobile -->
        <header class="dashboard-header">
            <div class="logo">
                <i class="fas fa-wallet"></i>
                <h1>Smart<span>Expense</span></h1>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="btn-icon" title="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="budget-alert hidden" id="budget-alert">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Budget Exceeded!</span>
                </div>
            </div>
        </header>

        <main class="dashboard-content">
            <!-- Summary Section -->
            <section class="summary-grid">
                <div class="summary-card balance">
                    <div class="card-icon"><i class="fas fa-scale-balanced"></i></div>
                    <div class="card-info">
                        <h3>Current Balance</h3>
                        <p id="total-balance">$0.00</p>
                    </div>
                </div>
                <div class="summary-card income">
                    <div class="card-icon"><i class="fas fa-arrow-trend-up"></i></div>
                    <div class="card-info">
                        <h3>Total Income</h3>
                        <p id="total-income" class="text-success">$0.00</p>
                    </div>
                </div>
                <div class="summary-card expense">
                    <div class="card-icon"><i class="fas fa-arrow-trend-down"></i></div>
                    <div class="card-info">
                        <h3>Total Expense</h3>
                        <p id="total-expense" class="text-danger">$0.00</p>
                    </div>
                </div>
            </section>

            <div class="main-grid">
                <!-- Left Column: Forms and Summary -->
                <div class="column-left">
                    <!-- Transaction Form -->
                    <div class="glass-card transaction-form">
                        <h2><i class="fas fa-plus-circle"></i> Add Transaction</h2>
                        <form id="exp-form">
                            <div class="form-group">
                                <label for="description">Description</label>
                                <input type="text" id="description" placeholder="Lunch, Rent, Salary..." required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="amount">Amount</label>
                                    <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                                </div>
                                <div class="form-group">
                                    <label for="type">Type</label>
                                    <select id="type">
                                        <option value="expense">Expense</option>
                                        <option value="income">Income</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="category">Category</label>
                                    <select id="category">
                                        <option value="Food">Food</option>
                                        <option value="Travel">Travel</option>
                                        <option value="Bills">Bills</option>
                                        <option value="Shopping">Shopping</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="date">Date</label>
                                    <input type="date" id="date" required>
                                </div>
                            </div>
                            <button type="submit" class="btn-primary">Add Transaction</button>
                        </form>
                    </div>

                    <!-- Monthly Summary Card -->
                    <div class="glass-card monthly-summary">
                        <h2><i class="fas fa-calendar-alt"></i> Monthly Summary</h2>
                        <div class="summary-stat">
                            <span>Monthly Limit:</span>
                            <div class="limit-input">
                                <input type="number" id="budget-limit" value="1000" step="10">
                            </div>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" id="budget-progress" style="width: 0%"></div>
                        </div>
                        <p id="monthly-expense-text">Monthly Expense: $0.00</p>
                    </div>
                </div>

                <!-- Right Column: Chart and History -->
                <div class="column-right">
                    <!-- Visualization -->
                    <div class="glass-card visualization">
                        <h2><i class="fas fa-chart-pie"></i> Spending by Category</h2>
                        <div class="chart-container">
                            <canvas id="category-chart"></canvas>
                        </div>
                    </div>

                    <!-- History -->
                    <div class="glass-card history">
                        <div class="card-header">
                            <h2><i class="fas fa-history"></i> Recent Transactions</h2>
                            <button id="export-btn" class="btn-secondary" title="Export CSV">
                                <i class="fas fa-file-export"></i> Export
                            </button>
                        </div>
                        <div class="table-wrapper">
                            <table id="transaction-table">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Description</th>
                                        <th>Category</th>
                                        <th>Amount</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="transaction-list">
                                    <!-- Dynamic rows -->
                                </tbody>
                            </table>
                        </div>
                        <p id="no-transactions" class="empty-state">No transactions yet.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
